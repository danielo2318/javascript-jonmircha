/*11) Programa una función que calcule el factorial de un número (El factorial de un entero positivo n, se define como el producto de todos los números enteros positivos desde 1 hasta n), pe. miFuncion(5) devolverá 120.*/

const factorial = (numero = undefined) => {
  if (numero === undefined)
     return console.warn("No ingresaste un número");

  if (typeof numero !== "number")
    return console.error(
      `El valor "${numero}" ingresado, NO es un número`
    );

  if (numero === 0) return console.error("El número no puede ser 0");

  if (Math.sign(numero) === -1)
    return console.error(`El número no puede ser negativo`);

  let factorial = 1;

  for (let i = numero; i > 1; i--) {
    factorial *= i;
    //factorial = factorial*i
  }

  return console.info(`El factorial de ${numero} es ${factorial} `);
};

/*12) Programa una función que determine si un número es primo (aquel que solo es divisible por sí mismo y 1) o no, pe. miFuncion(7) devolverá true.*/
const numeroPrimo = (numero = undefined) => {
  if (numero === undefined)
    return console.warn("No ingresaste un numero");

  if (typeof numero !== "number")
    return console.error(
       `El valor "${numero}" ingresado, NO es un número`
     );

   if (numero === 0) return console.error("El número no puede ser 0");

   if (numero === 1) return console.error("El número no puede ser 1");

   if (Math.sign(numero) === -1)
    return console.error("El número no puede ser negativo");

   let divisible = false;

  for (let i = 2; i < numero; i++) {
    if (numero % i === 0) {
      divisible = true;
      break;
     }
}

        
return (divisible)
 ? console.log(`El número ${numero}, NO es primo`)
 : console.log(`El número ${numero}, SÍ es primo`); 
};

14) Programa una función para convertir grados Celsius a Fahrenheit y viceversa, pe. miFuncion(0,"C") devolverá 32°F.*/
const convertirGrados = (grados = undefined, unidad = undefined) => {
  if(grados === undefined) return console.warn("No ingresaste grados a convertir")

  if(typeof grados !== "number") return console.error(`El valor "${grados}" Ingresado, NO es un número`);

  if(unidad === undefined)return console.error(`No ingresaste el tipo de grado a convertir`);

  if(typeof unidad !== "string") return console.error(`El valor "${unidad}" Ingresado, NO es una cadena de texto`)

  if(unidad.length !== 1 || !/(C|F)/.test(unidad) ) return console.warn(`Valor de unidad no reconocido`);

  if(unidad === "C") {
    return console.info(`${grados}°C = ${Math.round((grados*(9/5) + 32))}°F`)
  }else if(unidad === "F") {
    return console.info(`${grados}°F = ${Math.round(((grados-32)* (5/9)))}°C`)
  }else{
    return console.error("El tipo de grados a convertir NO es válido")
  }
}

const convertirBinarioDecimal = (numero = undefined, base = undefined) => {
  if(numero === undefined) return console.warn("No ingresaste el numero a convertir");

    return console.info(`${numero} base ${base} = ${(numero.toString(base))} base 2`);
  }else{
    return console.error("El tipo de base a cinvertir NO es válido")
  }
}

/*17) Programa una función que dada una fecha válida determine cuantos años han pasado hasta el día de hoy, pe. miFuncion(new Date(1984,4,23)) devolverá 35 años (en 2020).*/
const calcularAnios = (fecha = undefined) => { 
  if(fecha === undefined) return console.warn("No ingresaste la fecha");

  if(!(fecha instanceof Date)) return console.error("El valor que ingresaste no es una fecha válida");

  let hoyMenosFecha = new Date().getTime()-fecha.getTime(),
    aniosEnMS = 1000 * 60 * 60 * 24 * 365
    aniosHumanos = Math.floor(hoyMenosFecha/aniosEnMS);

  return(Math.sign(aniosHumanos) === -1)
  ? console.info(`Faltan ${Math.abs(aniosHumanos)} años para el ${fecha.getFullYear()}.`)
  : (Math.sign(aniosHumanos)=== 1)
     ? console.info(`Han pasado ${Math.abs(aniosHumanos)} años, desde ${fecha.getFullYear()}.`)
     :console.info(`Estamos en el año actual ${fecha.getFullYear()}.`)
}

/*18) Programa una función que dada una cadena de texto cuente el número de vocales y consonantes, pe. miFuncion("Hola Mundo") devuelva Vocales: 4, Consonantes: 5.*/
const contarLetras = (cadena ="") =>{
  if(!cadena) return console.warn("No ingresaste una cadena de texto");

  if(typeof cadena !== "string") return console.error(`El valor "${cadena}" ingresado, NO es una cadena de texto`);

  let vocales = 0,
    consonantes = 0;

  cadena = cadena.toLowerCase();

  for (let letra of cadena) {
    if(/[aeiouáéíóúü]/.test(letra)){
      vocales++
    }

    if(/[bcdfghjklmnñpqrstvwxyz]/.test(letra)){
      consonantes++
    }
  }

  return console.info({
    cadena,
    vocales,
    consonantes
  })
}

/*19) Programa una función que valide que un texto sea un nombre válido, pe. miFuncion("Jonathan MirCha") devolverá verdadero.*/
const validarNombre = (nombre ="") =>{
  if(!nombre) return console.warn(" No ingresaste un nombre");

  if(typeof nombre !== "string")return console.error(`El valor "${nombre}" ingresado, NO es una cadena de texto` );
  //el ^ significa que no puede haber nada antes de la expresion y el $ significa que no puede haber nada despues, los corchetes son para agrupar[], el simbolo + es para que lo evalue por cada cadena de texto(uno o mas caracteres, no acepta cadenas vacias ""), \s significa acepta espacios en blanco
  let expReg = /^[A-Za-zÑñÁáÉéÍíÓóÚúÜü\s]+$/g.test(nombre);

  return(expReg)
  ? console.info(`"${nombre}", es un nombre válido"`)
  : console.warn(`"${nombre}",NO es un nombre válido"`);

}

/*20) Programa una función que valide que un texto sea un email válido, pe. miFuncion("jonmircha@gmail.com") devolverá verdadero.*/
const validarEmail = (email ="") =>{
  if(!email) return console.warn(" No ingresaste un email");

  if(typeof email !== "string")return console.error(`El valor "${email}" ingresado, NO es una cadena de texto` );
  
  let expReg = /[a-z0-9]+(\.[_a-z0-9]+)*@[a-z0-9-]+(\.[a-z0-9-]+)*(\.[a-z]{2,15})/i.test(email);

  return(expReg)
  ? console.info(`"${email}", es un email válido"`)
  : console.warn(`"${email}",NO es un email  válido"`);

}

/*21) Programa una función que dado un array numérico devuelve otro array con los números elevados al cuadrado, pe. mi_funcion([1, 4, 5]) devolverá [1, 16, 25].*/
const devolverCuadrados = (arr = undefined) =>{
  if(arr === undefined)return console.warn("No ingresaste un arreglo de números");

  if(!(arr instanceof Array))return console.error(`El valor que ingresaste, NO es un arreglo`);

  if(arr.length ===0)return console.error("El arreglo esta vacío");
  //El for of se usa para recorrer cada elemento del arreglo arr, uno por uno, en cada vuelta del ciclo, num toma el valor de un elemento del arreglo
  for (let num of arr) {
    if(typeof num !== "number")return console.error(`El valor "${num}" ingresado, NO es un número`);
  }
  //El metodo .map() te permite generar un nuevo arreglo a partir de uno original. este metodo recibe el elemento 
  const newArr = arr.map(el=>el*el);  
//(el=>el*el) seria como decir 
// function cuadrado(el){
// return el*el}
  return console.info(`Arreglo original: ${arr}, \nArreglo elevado al cuadrado: ${newArr}`);
}

/*25) Programa una función que dado un arreglo de elementos, elimine los duplicados, pe. miFuncion(["x", 10, "x", 2, "10", 10, true, true]) devolverá ["x", 10, 2, "10", true].*/
const quitarDuplicados = (arr = undefined) => {
  if(arr === undefined) return console.warn("No ingresaste un arreglo de elementos");

  if(!(arr instanceof Array)) return console.error("El valor que ingresaste NO es un arreglo");

  if(arr.length === 0)return console.error("El arreglo esta vacío");

  if(arr.length === 1)return console.error("El arreglo debe de tener al menos 2 elementos");
//filter() recorre el arreglo elemento por elemento, devuelve un nuevo arreglo
//los parametros de filter() son:
//valor actual -> value
//posicion actual -> index
//el arreglo completo (arr) -> self

//self.indexOf(value) === index Esta es la condicion  
// self.indexOf(value) -> significa primera posicion donde aparece ese valor
//index -> posicion actula del recorrido

 /*  
 return console.info({
    original: arr,
    sinDuplicados: arr.filter((value, index, self)=>  self.indexOf(value) === index)
  })
*/

  //set permite generar un objeto en el que no se permitan elementos duplicados, es el tipo de naturaleza del tipo de dato set

  return console.info({
    original: arr,
    sinDuplicados: [...new Set(arr)]
  })
}

/*26) Programa una función que dado un arreglo de números obtenga el promedio, pe. promedio([9,8,7,6,5,4,3,2,1,0]) devolverá 4.5.*/
const promedio = (arr = undefined) =>{
 if(arr===undefined)return console.warn("No ingresaste un arreglo de numeros");

 if(!(arr instanceof Array)) return console.error("El valor que ingresaste no es un arreglo");

 if(arr.length ===0)return console.error("El arreglo esta vacío");

 for(let num of arr){
  if(typeof num !== "number")return console.error(`El valor "${num}" ingresado, NO es un número`);
 }
 //map().filter().reduce() si generan un nuevo arreglo sin modificar el original 
 //reduce() sirve para recorrer el arreglo y obtener solo un valor
 //los parametros del reduce aceptan un acumulador -> total,
 //  valor actual del arreglo -> num, posicion actual -> index, arreglo completo -> arr
 //total = total + num; total += num;
 // en este caso como no se pasa un valor inicial a reduce, JS hace esto:
 //total: empieza siendo el primer elemento
 //num empieza siendo el segundo
 return console.info(
  arr.reduce((total, num, index, arr)=>{
  total += num;
  if(index ===arr.length-1){
  return `El promedio de ${arr.join(" + ")} es ${total/arr.length}`
  }else{
    return total;
  }
  })
 )
}

/*27) Programa una clase llamada Pelicula.

  -Valida que el id IMDB tenga 9 caracteres, los primeros 2 sean letras y los 
                 7 restantes números.
  -Valida que el título no rebase los 100 caracteres.
  -Valida que el director no rebase los 50 caracteres.
  -Valida que el año de estreno sea un número entero de 4 dígitos.
  -Valida que el país o paises sea introducidos en forma de arreglo.
  -Valida que los géneros sean introducidos en forma de arreglo.
            -Valida que los géneros introducidos esten dentro de los géneros 
                 aceptados*.
  -Crea un método estático que devuelva los géneros aceptados*.
  -Valida que la calificación sea un número entre 0 y 10 pudiendo ser 
                decimal de una posición.
  -Crea un método que devuelva toda la ficha técnica de la película.
  -Apartir de un arreglo con la información de 3 películas genera 3 
                instancias de la clase de forma automatizada e imprime la ficha técnica 
                de cada película.

Géneros Aceptados: Action, Adult, Adventure, Animation, Biography, Comedy, Crime, Documentary ,Drama, Family, Fantasy, Film Noir, Game-Show, History, Horror, Musical, Music, Mystery, News, Reality-TV, Romance, Sci-Fi, Short, Sport, Talk-Show, Thriller, War, Western.*/

class Pelicula{
  constructor({id, titulo, director, estreno, pais, generos, calificacion}){
  this.id = id;
  this.titulo = titulo;
  this.director = director;
  this.estreno = estreno;
  this.pais = pais;
  this.generos = generos;
  this.calificacion = calificacion;

  this.validarIMDB(id);
  this.validarTitulo(titulo);
  this.validarDirector(director);
  this.validarEstreno(estreno);
  this.validarPais(pais);
  this.validarGeneros(generos);
  this.validarCalificacion(calificacion);
  }

  static get listaGeneros(){
    return ["Action", "Adult", "Adventure", "Animation", "Biography", "Comedy", "Crime", "Documentary" , "Drama", "Family", "Fantasy", "Film Noir", "Game-Show", "History", "Horror", "Musical", "Music", "Mystery", "News", "Reality-TV", "Romance", "Sci-Fi", "Short", "Sport", "Talk-Show", "Thriller", "War", "Western"];
  }

  static generosAceptados(){
    return console.info(`Los generos aceptados son: ${Pelicula.listaGeneros.join(", ")}`);
  }


  validarCadena(propiedad, valor){
   if(!valor) return console.warn(`${propiedad} "${valor}" esta vacío`);

   if(typeof valor !== "string") return console.error(`${propiedad} "${valor}" ingresado, NO es una cadena de texto `);

   return true;
  }

  validarNumero(propiedad, valor){
    if(!valor) return console.warn(`${propiedad} "${valor}" está vacío`);

    if(typeof valor !== "number") return console.error(`${propiedad} "${valor}" ingresado, NO es un número`);

    return true;
  }

  validarLongitudCadena(propiedad, valor, longitud){
    if(valor.length > longitud)return console.error(`${propiedad} "${valor}" excede el número de caracteres permitidos (${longitud}).`);

    return true;
  }

  validarArreglo(propiedad, valor){
    if(!valor)return console.warn(`${propiedad} "${valor}" esta vacío`);

    if(!(valor instanceof Array)) return console.error(`${propiedad} "${valor}" ingresado, NO es un arreglo`);

    if(valor.length ===0) return console.error(`${propiedad} "${valor}" no tiene datos`);

    for(let cadena of valor){
      if(typeof cadena !== "string") return console.error (`El valor "${cadena}" ingresado, NO es una cadena de texto`);
    }
    
    return true;
    
  }



  validarIMDB(id){
   if(this.validarCadena("IMDB id", id)){
    if(!(/^([a-z]{2})([0-9]{7})$/.test(id))){
      return console.error(`IMDB id "${id}" no es válido, debe tener 9 caracteres, los 2 primeros letras minúsculas, los 7 restantes números`);
    }
   }
  }

  validarTitulo(titulo){
   if(this.validarCadena("Título", titulo))
    this.validarLongitudCadena("Título", titulo, 100);
   }

  validarDirector(director){
   if(this.validarCadena("Director", director))
    this.validarLongitudCadena("Título", director, 50);
   }
  
   validarEstreno(estreno){
   if(this.validarNumero("Año de Estreno", estreno))
    if(!(/^([0-9]{4})$/.test(estreno)))
      return console.error(`Año de estreno "${estreno}" no es válido, debe ser un número de 4 digitos`);
   }

   validarPais(pais){
    this.validarArreglo("País", pais)
   }

    validarGeneros(generos){
    if(this.validarArreglo("Géneros", generos)){
      for(let genero of generos){
        //console.log(genero, Pelicula.listaGeneros.includes(genero));
        if(!Pelicula.listaGeneros.includes(genero)){
          console.error(`Género(s) incorrectos "${generos.join(", ")}"`);
          Pelicula.generosAceptados();
        }
      }
    }
   }

   validarCalificacion(calificacion){
   if(this.validarNumero("Calificación", calificacion))
    return(calificacion < 0 || calificacion > 10)
     ? console.error(`La calificación tiene que estar en un rango entre 0 y 10`)
     :this.calificacion =calificacion.toFixed(1);
   }

   fichaTecnica(){
    console.info(`Ficha Técnica:\nTítulo: "${this.titulo}"\nDirector: "${this.director}"\nAño: "${this.estreno}"\nPaís: "${this.pais.join(", ")}\nGéneros: "${this.generos.join(", ")}"\nCalificación: "${this.calificacion}"\nIMDB Id: "${this.id}"`)
   }
}
