  /*2) Programa una función que te devuelva el texto recortado según el número de caracteres indicados, pe. miFuncion("Hola Mundo", 4) devolverá "Hola".*/
  const recortarTexto = (cadena = "", longitud = undefined) =>
    !cadena
      ? console.warn("No ingresaste el texto")
      : longitud === undefined
        ? console.warn("No ingresaste la longitud para recortar el texto")
        : console.info(
          `Texto inicial: "${cadena}", texto final:${cadena.slice(0, longitud)}`
        );

    const recortarTexto2 = (cadena = "", longitud = undefined) =>
  !cadena
    ? console.warn("No ingresaste el texto")
    : longitud === undefined
      ? console.warn("No ingresaste la longitud para recortar el texto")
      : typeof cadena !== "string"
        ? console.error("El valor ingresado debe ser un texto") // <- Condición ? Acción
        : typeof longitud !== "number"
          ? console.error("El valor ingresado debe ser un número") // <- Condición ? Acción
          : console.info(`Texto inicial: "${cadena}", texto final: ${cadena.slice(0, longitud)}`);

  recortarTexto("hola mundo", 6);
  recortarTexto("hola mundo", 6);
